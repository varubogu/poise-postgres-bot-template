volumes:
  postgres-data:

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      RUST_LOG: debug
      DB_HOST: db
    command: sleep infinity
    networks:
      - app-network

  db:
    build:
      context: ../
      dockerfile: Dockerfile.db
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql
    env_file:
      - ../.env.db.example
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
